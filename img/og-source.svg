<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <radialGradient id="bg" cx="78%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#1F6F8B" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#1F2A33" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="60" cy="60" r="1.4" fill="#FFFFFF" fill-opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#1F2A33"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)" opacity="0.6"/>

  <!-- Большая молекула справа -->
  <g transform="translate(800, 105) scale(2.1)">
    <g stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" opacity="0.85">
      <line x1="40" y1="40" x2="120" y2="40"/>
      <line x1="120" y1="40" x2="120" y2="120"/>
      <line x1="120" y1="120" x2="40" y2="120"/>
      <line x1="40" y1="120" x2="40" y2="40"/>
      <line x1="60" y1="60" x2="140" y2="60"/>
      <line x1="140" y1="60" x2="140" y2="140"/>
      <line x1="140" y1="140" x2="60" y2="140"/>
      <line x1="60" y1="140" x2="60" y2="60"/>
      <line x1="40" y1="40" x2="60" y2="60"/>
      <line x1="120" y1="40" x2="140" y2="60"/>
      <line x1="40" y1="120" x2="60" y2="140"/>
      <line x1="120" y1="120" x2="140" y2="140"/>
    </g>
    <!-- Внутренний тетраэдр в нижне-левом квадранте -->
    <g stroke="#4CA1AF" stroke-width="1.4" stroke-linecap="round" opacity="0.95">
      <line x1="78" y1="92" x2="58" y2="106"/>
      <line x1="78" y1="92" x2="80" y2="110"/>
      <line x1="78" y1="92" x2="66" y2="122"/>
      <line x1="58" y1="106" x2="80" y2="110"/>
      <line x1="58" y1="106" x2="66" y2="122"/>
      <line x1="80" y1="110" x2="66" y2="122"/>
    </g>
    <!-- Длинные диагонали угол куба → апекс / базовые атомы -->
    <g stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.55">
      <line x1="60" y1="60" x2="78" y2="92"/>
      <line x1="140" y1="60" x2="78" y2="92"/>
      <line x1="40" y1="120" x2="58" y2="106"/>
      <line x1="120" y1="120" x2="80" y2="110"/>
    </g>
    <g fill="#FFFFFF">
      <circle cx="40" cy="40" r="5.5"/>
      <circle cx="120" cy="40" r="5.5"/>
      <circle cx="40" cy="120" r="5.5"/>
      <circle cx="120" cy="120" r="5.5"/>
      <circle cx="60" cy="60" r="5.5"/>
      <circle cx="140" cy="60" r="5.5"/>
      <circle cx="60" cy="140" r="5.5"/>
      <circle cx="140" cy="140" r="5.5"/>
    </g>
    <g fill="#4CA1AF">
      <circle cx="78" cy="92" r="3.6"/>
      <circle cx="58" cy="106" r="3.6"/>
      <circle cx="80" cy="110" r="3.6"/>
      <circle cx="66" cy="122" r="3.6"/>
    </g>
  </g>

  <!-- Текст слева -->
  <g font-family="Unbounded, sans-serif" fill="#FFFFFF">
    <!-- Eyebrow -->
    <g font-family="JetBrains Mono, monospace" font-size="18" letter-spacing="2" fill="#1F6F8B">
      <rect x="80" y="93" width="32" height="2" fill="#1F6F8B"/>
      <text x="124" y="100">САНКТ-ПЕТЕРБУРГ · С 2000</text>
    </g>
    <!-- Slogan -->
    <text x="80" y="220" font-size="68" font-weight="700" letter-spacing="-2">Покрываем металл —</text>
    <text x="80" y="296" font-size="68" font-weight="700" letter-spacing="-2" fill="#FFFFFF" opacity="0.95">возвращаем результат.</text>
    <!-- Subtitle -->
    <text x="80" y="370" font-family="Onest, sans-serif" font-size="22" font-weight="400" fill="#FFFFFF" opacity="0.65">Центр гальванических покрытий.</text>
    <text x="80" y="402" font-family="Onest, sans-serif" font-size="22" font-weight="400" fill="#FFFFFF" opacity="0.65">Производство для ОПК, авиации, реставрации.</text>

    <!-- ГАЛАРС wordmark bottom -->
    <text x="80" y="555" font-size="56" font-weight="700" letter-spacing="2">ГАЛАРС</text>
    <text x="80" y="585" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="2" fill="#FFFFFF" opacity="0.5">центр гальванических покрытий</text>
  </g>

  <!-- Edge accents -->
  <rect x="0" y="0" width="1200" height="3" fill="#1F6F8B"/>
  <rect x="0" y="627" width="1200" height="3" fill="#1F6F8B" opacity="0.5"/>
</svg>
